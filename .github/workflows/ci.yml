name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          nhl_dbt:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: nhl_raw.duckdb
          EOF

      - name: Run dbt deps
        run: dbt deps
        working-directory: nhl_dbt

      - name: Run dbt build
        run: dbt build
        working-directory: nhl_dbt