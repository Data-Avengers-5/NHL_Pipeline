  - row_count > 0
  - missing_count(game_id) = 0:
      name: game_id must never be null
  - missing_count(player_id) = 0:
      name: player_id must never be null
  - missing_count(team_id) = 0:
      name: team_id must never be null
  # Validity
  - min(timeOnIce) >= 0:
      name: ice time cannot be negative
  - min(goals) >= 0:
      name: goals cannot be negative
  - min(assists) >= 0:
      name: assists cannot be negative

# ---------------------------------------------------------------
# stg_game_goalie_stats — one row per goalie per game
# ---------------------------------------------------------------
checks for stg_game_goalie_stats:
  # Completeness
  - row_count > 0
  - missing_count(game_id) = 0:
      name: game_id must never be null
  - missing_count(player_id) = 0:
      name: player_id must never be null
  - missing_count(team_id) = 0:
