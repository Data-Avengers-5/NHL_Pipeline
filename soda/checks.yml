# ---------------------------------------------------------------
# stg_game_plays — one row per play event
# Filtered to 6 event types at staging: Goal, Shot, Missed Shot,
# Blocked Shot, Penalty, Takeaway. Deduped on play_id.
# ---------------------------------------------------------------
checks for stg_game_plays:
  # Completeness
  - row_count between 2000000 and 4000000:
      name: stg_game_plays row count within expected range (post-filter)
  - missing_count(play_id) = 0:
      name: play_id must never be null
  - missing_count(game_id) = 0:
      name: game_id must never be null
  - missing_count(event) = 0:
      name: event type must never be null
  # Uniqueness — QUALIFY ROW_NUMBER() should leave one row per play_id
  - duplicate_count(play_id) = 0:
      name: play_id must be unique after staging dedup
  # Validity — only the 6 filtered event types should survive
  - invalid_count(event) = 0:
      name: only filtered event types should be present
      valid values: [Goal, Shot, Missed Shot, Blocked Shot, Penalty, Takeaway]
  # The 41% finding — goal coordinates are systematically missing pre-2010
  # Overall coordinate missing rate should be moderate (most events post-2010)
  - missing_percent(coord_x) < 50:
      name: overall coord_x missing rate should be under 50 percent
  - missing_percent(coord_y) < 50:
      name: overall coord_y missing rate should be under 50 percent
  # Sentinel: alert if goal coordinate NULL rate drops below expected.
  # Fires if someone silently imputes or filters NULLs upstream — protects
  # the visibility of the era-boundary finding.
  - missing_percent(coord_x) > 30:
      name: goal coord_x missing rate should be above 30 percent (41.4% expected)
      filter: event = 'Goal'

# ---------------------------------------------------------------
# stg_game_penalties — one row per penalty play (247,828 rows expected
# at source; deduped on play_id at staging)
# Note: this staging model is narrow — only play_id, penalty_severity,
# and penalty_minutes. Game/team context is joined downstream in
# mart_penalty_cost via fct_play.
# ---------------------------------------------------------------
checks for stg_game_penalties:
  # Completeness
  - row_count between 200000 and 300000:
      name: stg_game_penalties row count within expected range
  - missing_count(play_id) = 0:
      name: play_id must never be null
  - missing_count(penalty_severity) = 0:
      name: penalty severity must never be null
  - missing_count(penalty_minutes) = 0:
      name: penalty minutes must never be null
  # Uniqueness — QUALIFY dedup at staging
  - duplicate_count(play_id) = 0:
      name: play_id must be unique after staging dedup
  # Validity
  - min(penalty_minutes) >= 2:
      name: minimum penalty is 2 minutes
  - max(penalty_minutes) <= 10:
      name: maximum standard penalty is 10 minutes
  - invalid_count(penalty_severity) = 0:
      name: penalty severity must be a known type
      valid values: [Minor, Major, Misconduct, Game Misconduct, Match, Bench Minor, Penalty Shot]