# Soda Core Data Quality Checks
# NHL Pipeline — designed for the Silver (staging) layer in DuckDB
# Run with: soda scan -d nhl_duckdb -c soda/configuration.yml soda/checks.yml
#
# Status: Scaffolded data quality coverage. Not executed in Phase 1 — dbt tests
# are the active DQ layer (see README "Considered but Not Implemented").
# Updated to match current snake_case staging schema.

# ---------------------------------------------------------------
# stg_game — one row per game (filtered: excludes all-star + tbc)
# Expect <23,735 rows after staging-level filters
# ---------------------------------------------------------------
checks for stg_game:
  # Completeness
  - row_count between 20000 and 30000:
      name: stg_game row count within expected range
  - missing_count(game_id) = 0:
      name: game_id must never be null
  - missing_count(season) = 0:
      name: season must never be null
  - missing_count(season_year) = 0:
      name: derived season_year must never be null
  - missing_count(home_team_id) = 0:
      name: home team must always be present
  - missing_count(away_team_id) = 0:
      name: away team must always be present
  - missing_count(winner) = 0:
      name: winner must be derived from outcome
  # Uniqueness
  - duplicate_count(game_id) = 0:
      name: game_id must be unique
  # Validity
  - invalid_count(game_type) = 0:
      name: game_type must be R (regular) or P (playoff) — A (all-star) excluded at staging
      valid values: [R, P]
  # Sanity: staging filters should have removed all-star and tbc rows
  - failed rows:
      name: no all-star games should survive staging
      fail condition: is_allstar = true
  - failed rows:
      name: no tbc outcomes should survive staging
      fail condition: is_tbc = true

# ---------------------------------------------------------------
# stg_game_teams_stats — one row per team per game (52,610 rows expected)
# ---------------------------------------------------------------
checks for stg_game_teams_stats:
  # Completeness
  - row_count between 45000 and 60000:
      name: stg_game_teams_stats row count within expected range
  - missing_count(game_id) = 0:
      name: game_id must never be null
  - missing_count(team_id) = 0:
      name: team_id must never be null
  - missing_count(goals) = 0:
      name: goals must never be null
  - missing_count(shots) = 0:
      name: shots must never be null
  - missing_count(is_home) = 0:
      name: is_home flag must never be null
  # Validity
  - min(goals) >= 0:
      name: goals cannot be negative
  - min(shots) >= 0:
      name: shots cannot be negative
  - min(pp_conversion_rate) >= 0:
      name: power play conversion rate cannot be negative
  - max(pp_conversion_rate) <= 1:
      name: power play conversion rate cannot exceed 100 percent

