# ---------------------------------------------------------------
# stg_player_info — one row per player
# ---------------------------------------------------------------
checks for stg_player_info:
  # Completeness
  - row_count > 0
  - missing_count(player_id) = 0:
      name: player_id must never be null
  - missing_count(firstName) = 0:
      name: first name must never be null
  - missing_count(lastName) = 0:
      name: last name must never be null
  # Uniqueness
  - duplicate_count(player_id) = 0:
      name: player_id must be unique

# ---------------------------------------------------------------
# stg_game_plays — one row per play event (filtered to 5 event types)
# ---------------------------------------------------------------
checks for stg_game_plays:
  # Completeness
  - row_count > 0
  - missing_count(play_id) = 0:
      name: play_id must never be null
  - missing_count(game_id) = 0:
      name: game_id must never be null
  - missing_count(event) = 0:
      name: event type must never be null
  # Validity — only 5 event types should exist after filtering
  - invalid_count(event) = 0:
      name: only filtered event types should be present
      valid values: [Goal, Shot, Missed Shot, Blocked Shot, Penalty]
  # The 41% finding — goal coordinates are frequently missing
  - missing_percent(x) < 50:
      name: x coordinate missing rate should be under 50 percent
  - missing_percent(y) < 50:
      name: y coordinate missing rate should be under 50 percent
  # Alert if goal coordinate NULL rate drops below expected range
  # (indicates someone may have filtered NULLs out upstream)
  - missing_percent(x) > 30:
      name: x coordinate missing rate for goals should be above 30 percent (41% expected)
      filter: event = 'Goal'
